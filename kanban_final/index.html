<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Task Manager</title>
  <script src="js/storage.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-mode.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <header class="app-header">
    <div class="header-brand">
      <div class="logo-icon">
        <i class="fa-solid fa-list-check" aria-hidden="true"></i>
      </div>
      <div>
        <h1>Kanban Task Manager</h1>
        <p class="subtitle">Streamline your tasks in real-time</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-button" id="archiveButton" type="button" aria-label="Open archive" title="Archive">
        <i class="fa-solid fa-box-archive" aria-hidden="true"></i> Archive
      </button>
      <button class="icon-button" id="exportButton" type="button" aria-label="Export tasks to JSON" title="Export JSON">
        <i class="fa-solid fa-download" aria-hidden="true"></i> Export
      </button>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark and light mode">
        <i class="fa-solid fa-moon" id="themeIcon" aria-hidden="true"></i>
        <span id="themeToggleText">Dark</span>
      </button>
      <button class="primary-button" id="globalAddTask" type="button">
        <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Task
      </button>
    </div>
  </header>

  <main>
    <section class="stats-bar" aria-label="Task statistics">
      <article class="stat-card">
        <div class="stat-icon-row">
          <i class="fa-solid fa-list-check stat-icon" aria-hidden="true"></i>
          <span>Total Tasks</span>
        </div>
        <strong id="totalTasks">0</strong>
      </article>
      <article class="stat-card">
        <div class="stat-icon-row">
          <i class="fa-solid fa-spinner stat-icon inprogress" aria-hidden="true"></i>
          <span>In Progress</span>
        </div>
        <strong id="inProgressTasks">0</strong>
      </article>
      <article class="stat-card">
        <div class="stat-icon-row">
          <i class="fa-solid fa-circle-check stat-icon completed" aria-hidden="true"></i>
          <span>Completed</span>
        </div>
        <strong id="completedTasks">0</strong>
      </article>
      <article class="stat-card">
        <div class="stat-icon-row">
          <i class="fa-solid fa-circle-exclamation stat-icon overdue-icon" aria-hidden="true"></i>
          <span>Overdue</span>
        </div>
        <strong id="overdueTasks">0</strong>
      </article>
      <article class="stat-card completion-card">
        <div class="stat-icon-row">
          <i class="fa-solid fa-chart-line stat-icon" aria-hidden="true"></i>
          <span>Completion</span>
        </div>
        <strong id="completionPercent">0%</strong>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="completionBar"></div>
        </div>
      </article>
    </section>

    <section class="controls-panel" aria-label="Search, filter and sort tasks">
      <label class="search-control" for="searchInput">
        <span>Search</span>
        <input id="searchInput" type="search" placeholder="Search title, description, or tags">
      </label>
      <label for="priorityFilter">
        <span>Priority</span>
        <select id="priorityFilter">
          <option value="all">All</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </label>
      <label for="sortSelect">
        <span>Sort</span>
        <select id="sortSelect">
          <option value="created">Date Created</option>
          <option value="dueDate">Due Date</option>
          <option value="priority">Priority</option>
        </select>
      </label>
      <button class="secondary-button" id="clearFilters" type="button">
        <i class="fa-solid fa-rotate-left" aria-hidden="true"></i> Clear Filters
      </button>
    </section>

    <nav class="mobile-tabs" aria-label="Column tabs">
      <button class="tab-button active" type="button" data-tab="todo">To Do</button>
      <button class="tab-button" type="button" data-tab="inprogress">In Progress</button>
      <button class="tab-button" type="button" data-tab="done">Done</button>
    </nav>

    <section class="board" id="board" aria-label="Kanban board">
      <article class="kanban-column active" data-column="todo">
        <header class="column-header">
          <div>
            <h2>To Do</h2>
            <p>New tasks</p>
          </div>
          <span class="count-badge" id="todoCount">0</span>
        </header>
        <button class="column-add" type="button" data-add-column="todo">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Task
        </button>
        <div class="task-list" id="todoList" data-drop-column="todo"></div>
      </article>

      <article class="kanban-column" data-column="inprogress">
        <header class="column-header">
          <div>
            <h2>In Progress</h2>
            <p>Being worked on</p>
          </div>
          <span class="count-badge" id="inprogressCount">0</span>
        </header>
        <button class="column-add" type="button" data-add-column="inprogress">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Task
        </button>
        <div class="task-list" id="inprogressList" data-drop-column="inprogress"></div>
      </article>

      <article class="kanban-column" data-column="done">
        <header class="column-header">
          <div>
            <h2>Done</h2>
            <p>Completed tasks</p>
          </div>
          <span class="count-badge" id="doneCount">0</span>
        </header>
        <button class="column-add" type="button" data-add-column="done">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Task
        </button>
        <div class="task-list" id="doneList" data-drop-column="done"></div>
      </article>
    </section>
  </main>

  <div class="modal-backdrop hidden" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <section class="modal-panel">
      <header class="modal-header">
        <h2 id="modalTitle">Create Task</h2>
        <button class="icon-only" id="closeTaskModal" type="button" aria-label="Close task form">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </header>
      <form id="taskForm" novalidate>
        <input id="taskId" type="hidden">
        <label for="taskTitle">
          <span>Title</span>
          <input id="taskTitle" type="text" minlength="3" required>
          <small class="error-message" id="titleError"></small>
        </label>
        <label for="taskDescription">
          <span>Description</span>
          <textarea id="taskDescription" rows="4"></textarea>
        </label>
        <div class="form-grid">
          <label for="taskPriority">
            <span>Priority</span>
            <select id="taskPriority" required>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
            <small class="error-message" id="priorityError"></small>
          </label>
          <label for="taskDueDate">
            <span>Due Date</span>
            <input id="taskDueDate" type="date" required>
            <small class="error-message" id="dueDateError"></small>
          </label>
        </div>
        <label for="taskColumn">
          <span>Assigned Column</span>
          <select id="taskColumn" required>
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
        </label>
        <label for="tagInput">
          <span>Tags</span>
          <div class="tag-editor" id="tagEditor">
            <div class="tag-list" id="formTags"></div>
            <input id="tagInput" type="text" placeholder="Type a tag and press Enter">
          </div>
          <small class="hint">Press Enter or comma to add a tag.</small>
        </label>
        <footer class="modal-actions">
          <button class="secondary-button" id="cancelTask" type="button">Cancel</button>
          <button class="primary-button" id="submitTask" type="submit">Create Task</button>
        </footer>
      </form>
    </section>
  </div>

  <div class="modal-backdrop hidden" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <section class="confirm-panel">
      <h2 id="confirmTitle"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i> Archive task?</h2>
      <p id="confirmMessage">This task will move to the archive.</p>
      <div class="modal-actions">
        <button class="secondary-button" id="cancelConfirm" type="button">Cancel</button>
        <button class="danger-button" id="confirmDelete" type="button">
          <i class="fa-solid fa-box-archive" aria-hidden="true"></i> Archive
        </button>
      </div>
    </section>
  </div>

  <aside class="archive-panel hidden" id="archivePanel" aria-label="Archived tasks">
    <header class="archive-header">
      <h2><i class="fa-solid fa-box-archive" aria-hidden="true"></i> Archive</h2>
      <button class="icon-only" id="closeArchive" type="button" aria-label="Close archive">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </header>
    <div id="archiveList" class="archive-list"></div>
  </aside>

  <script src="js/filters.js" defer></script>
  <script src="js/tasks.js" defer></script>
  <script src="js/stats.js" defer></script>
  <script src="js/board.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
